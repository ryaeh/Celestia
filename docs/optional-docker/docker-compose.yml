# Optional — Qdrant vector DB for memory.backend: qdrant
# See README.md. Extra services: docker-compose.extra.yml

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_data:
