# Celestia — copy from config.example.yaml to customize.

app:
  display_name: Celestia
  user_id: atlas_user
  log_dir: logs

chat:
  session_enabled: true    # -i mode: remember earlier messages in this session
  session_max_messages: 60 # trim older turns (keeps system prompts at start)

personality:
  active: default
  dir: personalities

llm:
  provider: ollama
  host: http://127.0.0.1:11434
  chat_model: qwen2.5:7b
  vision_model: llama3.2-vision:11b
  vision_fast_model: moondream
  vision_text_model: qwen2.5vl:7b
  embed_model: nomic-embed-text

memory:
  enabled: true
  inject: smart          # smart | always | off — when to auto-load memories into chat
  session_consolidate: true
  session_consolidate_every: 4      # every N chat turns, summarize → long-term memory
  session_consolidate_on_end: true  # also run on newchat / quit
  session_consolidate_verbose: true # print [memory] saved: ... with reasoning
  session_consolidate_max_facts: 3
  provider: mem0
  vector_store: chroma
  chroma:
    path: data/chroma
  qdrant:
    host: localhost
    port: 6333

voice:
  always_speak: false
  push_to_talk_hotkey: ctrl+alt+v
  stt:
    enabled: true
    model: large-v3
    device: cuda
    compute_type: float16
    idle_unload_minutes: 10
  tts:
    provider: orpheus
    voice: tara
    emotion_tags: true
    orpheus:
      backend: local
      model_gguf: models/Orpheus-3b-FT-Q8_0.gguf
      n_gpu_layers: -1
      n_ctx: 8192
      max_tokens: 4096
      idle_shutdown_minutes: 5
      mode: on_demand
      api_url: http://127.0.0.1:1234/v1/completions
      llama_server_bin: ""
    edge:
      voice: en-US-GuyNeural

vision:
  enabled: true
  hotkey: ctrl+shift+s
  default_mode: region
  max_edge_px: 2048
  max_tokens: 4096
  transcribe_tokens: 4096
  temperature: 0.0
  text_model: qwen2.5vl:7b
  two_pass_text: true
  preprocess_text: true
  force_text_mode: false
  confirm_before_send: true
  confirm_mode: text
  tts_confirm_prompt: "Do you want me to send this screenshot for analysis?"
  allow_voice_confirm: false
  temp_dir: temp/vision
  delete_after_minutes: 15
  audit_log: logs/vision_audit.jsonl

pc_control:
  require_confirm_destructive: true
  app_aliases: {}

security:
  mode: safe
  default_armed: false
  shared_armed_state: true
  # Allowlists & workspaces: security.policy.yaml (integrity-checked with config)
  file_read_max_bytes: 262144
  file_write_max_bytes: 524288
  audit_tools: true
  audit_log: logs/tool_audit.jsonl
  integrity_check: true
  integrity_store: data/config.trust

resources:
  cuda_visible_devices: "0"

ui:
  tray: true

automation:
  n8n_enabled: false
  n8n_url: http://localhost:5678
  n8n_webhook_path: /webhook/celestia

docker:
  qdrant_port: 6333
