# Default template. Copy to config.yaml to start, or edit config.yaml directly.
# Secrets: .env only (HF_TOKEN). config.yaml is safe to commit if you keep secrets out.

app:
  display_name: Celestia
  user_id: atlas_user
  log_dir: logs

chat:
  session_enabled: true
  session_max_messages: 60
  consolidate_before_delete: true  # when deleting a chat, distill it into long-term
                                    # memory first so what she learned survives — only
                                    # the raw transcript is removed (false = hard delete)
  search_enabled: true              # expose the search_conversations tool + sidebar
                                    # search over past chats (Feature 03 / #86)

personality:
  active: default
  dir: personalities

llm:
  provider: ollama
  host: http://127.0.0.1:11434
  chat_model: llama3.2:3b
  vision_model: llama3.2-vision:11b
  vision_text_model: qwen2.5vl:7b
  vision_fast_model: moondream
  embed_model: nomic-embed-text
  request_timeout_seconds: 60   # seconds before an Ollama call is aborted (CC-92)
  max_tokens: 1024              # max tokens per LLM reply (num_predict)

memory:
  enabled: true
  inject: always_budgeted      # always_budgeted | smart | off
  inject_max_lines: 8
  inject_max_chars: 1200
  last_session_path: data/memory/last_session.json
  activity_feed_path: data/memory/activity_feed.jsonl
  session_consolidate: true
  session_consolidate_mode: auto
  session_consolidate_every: 6
  session_consolidate_min_user_turns: 2
  session_consolidate_on_end: true
  session_consolidate_verbose: false
  session_consolidate_max_facts: 3
  kinds_enabled: [fact, instruction, summary, task]
  # Recall ranking (memory lifecycle, step 2): when choosing which memories to
  # inject, blend raw similarity with each memory's importance, how often it's
  # been recalled, and recency. One-off lookups sink; useful memories float up.
  ranking:
    enabled: true
    weight_similarity: 0.5
    weight_importance: 0.25
    weight_recall: 0.15
    weight_recency: 0.10
    recency_halflife_days: 30
  # Decay-delete (memory lifecycle, step 3): periodically remove memories that
  # earned no keep — low importance, NEVER recalled, older than ttl_days.
  # Protected kinds and any ever-recalled memory are never deleted. OFF by
  # default because it deletes data — set enabled: true (then --trust-config).
  decay:
    enabled: false
    ttl_days: 30
    min_importance: 0.5       # entries at/above this importance are kept regardless of age
    protect_kinds: [instruction]
    min_interval_hours: 24    # at most one automatic sweep per this many hours
    scan_limit: 500
  vector_store: chroma
  chroma:
    path: data/chroma
  qdrant:
    host: localhost
    port: 6333
  # Temporal knowledge-graph memory (Feature 10) — structural, time-aware recall
  # alongside vector similarity. SQLite-backed, on-device. Default off until the
  # extraction + retrieval passes land.
  graph:
    enabled: false
    active_graph: default        # named graphs live in data/memory/graph/<name>.db
    walk_hops: 2                 # graph-walk depth during recall
    retain_history: true         # never delete; versioned supersede
    inline_extraction: light     # light | off — cheap per-turn entity capture
    deep_pass: background        # background | off — full relation extraction (mode may override)

# To-do list — user-owned tasks you add in the app and discuss with Celestia.
# She can read and organize the list via tools (todo_add / todo_complete / …).
# Stored as a plain JSON list; not PC-touching, so available in every mode.
todos:
  enabled: true
  data_path: data/todos.json

voice:
  push_to_talk_hotkey: ctrl+alt+v
  reply_cap_voice: true          # cap voice replies to ~2 sentences (CC-98)
  stt:
    enabled: true
    model: base.en                # base.en = fast CPU; large-v3 = quality GPU
    device: cpu                   # cpu or cuda
    compute_type: int8            # int8 for cpu, float16 for cuda
    idle_unload_minutes: 10
    vad_filter: false             # filter silent segments during transcription (CC-97) — enable for GPU users
    noise_gate_threshold: 0.005   # RMS below this is zeroed before transcription
    silence_stop_seconds: 1.5     # auto-stop recording after N seconds of silence
  tts:
    provider: orpheus
    voice: tara
    orpheus:
      backend: local
      model_gguf: models/Orpheus-3b-FT-Q8_0.gguf
      n_gpu_layers: -1
      n_ctx: 8192
      idle_shutdown_minutes: 5
    edge:
      voice: en-US-GuyNeural

vision:
  enabled: true
  hotkey: ctrl+shift+s
  default_mode: region
  max_edge_px: 1280          # downscale screenshots — fewer image tokens, less VRAM
  max_tokens: 1536           # cap general-description length
  transcribe_tokens: 4096
  temperature: 0.0
  keep_alive: "30s"          # unload the vision model this long after use (frees VRAM)
  unload_chat_model: true    # drop the chat LLM before a vision load so the two
                             # big models never co-reside and oversubscribe the GPU
  general_model: qwen2.5vl:7b  # capable VLM for general screenshots; moondream is
                               # faster but hallucinates. Escalates to vision_model on
                               # failure (blank = off)
  text_model: qwen2.5vl:7b
  two_pass_text: true
  preprocess_text: true
  force_text_mode: false
  confirm_before_send: true
  confirm_mode: text
  allow_voice_confirm: false   # when true, prefer voice yes/no before text confirm

pc_control:
  require_confirm_destructive: true
  powershell_timeout_seconds: 30
  powershell_output_max_chars: 4000
  app_aliases: {}              # e.g. notepad: "C:\\Program Files\\Notepad++\\notepad++.exe"

security:
  mode: safe
  default_armed: false
  shared_armed_state: true
  scoped_allow_readonly_powershell: true  # in scoped mode, allow read-only PowerShell/Cmd
                                          # (Get-*, dir, ipconfig, systeminfo). Anything that
                                          # changes state stays armed-only.
  # tray_max_mode: scoped   # optional: cap tray/voice/screen (safe | scoped | armed)
  # Allowlists & workspaces live in security.policy.yaml (copy from security.policy.example.yaml)
  file_read_max_bytes: 262144
  file_write_max_bytes: 524288
  audit_tools: true
  audit_log: logs/tool_audit.jsonl
  integrity_check: true
  integrity_store: data/config.trust

# After editing config: run_celestia.py --trust-config

ui:
  tray: true
  shell_port: 8765
  shell_settings: true   # --settings opens Tauri shell; false = tk window
  # shell_chat_store: data/shell_chat/sessions.json
  shell_ptt_enabled: true
  shell_ptt_hotkey: ctrl+alt+shift+v   # hold = talk; empty = mic button only (tray uses ctrl+alt+v)
  shell_ptt_max_seconds: 45

read_hotkey:
  enabled: true
  hotkey: "ctrl+alt+space"
  scope: active_window       # active_window | fullscreen
  speak_answer: false
  question: "What is on screen? Describe what you see concisely."

automation:
  n8n_enabled: false
  n8n_url: http://localhost:5678
  n8n_webhook_path: /webhook/celestia

# Only used when memory.vector_store is qdrant; start Qdrant via docs/optional-docker/
docker:
  qdrant_port: 6333
